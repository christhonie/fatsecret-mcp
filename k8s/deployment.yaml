apiVersion: apps/v1
kind: Deployment
metadata:
  name: fatsecret-mcp
  namespace: mcp
  labels:
    app.kubernetes.io/name: fatsecret-mcp
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fatsecret-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fatsecret-mcp
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fatsecret-mcp
          image: docker.io/christhonie/fatsecret-mcp:0.3.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: fatsecret-mcp-secrets
          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            # FatSecret OAuth 2.0 scope for public food/recipe endpoints.
            # Premier plan: "premier barcode". Adding a scope the account is
            # not entitled to fails the token request and breaks public search.
            - name: FATSECRET_OAUTH2_SCOPE
              value: "premier barcode"
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
