# nginx ingress + cert-manager (letsencrypt-prod) + external-dns (Cloudflare).
# claude.ai's Streamable HTTP can hold SSE responses open, so proxy buffering
# is disabled and read/send timeouts are extended.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fatsecret-mcp
  namespace: mcp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - fatsecret-mcp.christhonie.co.za
      secretName: fatsecret-mcp-christhonie-co-za-tls
  rules:
    - host: fatsecret-mcp.christhonie.co.za
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fatsecret-mcp
                port:
                  number: 8000
