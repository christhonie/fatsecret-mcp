# TEMPLATE — do not commit with real values.
#
# 1. Run `npm run bootstrap` locally to obtain the FatSecret user access token.
# 2. Generate a bearer token: `openssl rand -hex 32`
# 3. Fill in the values below, then apply with `kubectl apply -f secret.yaml`.
#    (Rename this file to secret.yaml or pipe through envsubst.)
#
# Alternatively, create the Secret imperatively without committing values:
#
#   kubectl -n fatsecret-mcp create secret generic fatsecret-mcp-secrets \
#     --from-literal=FATSECRET_CLIENT_ID=... \
#     --from-literal=FATSECRET_CLIENT_SECRET=... \
#     --from-literal=FATSECRET_CONSUMER_SECRET=... \
#     --from-literal=FATSECRET_ACCESS_TOKEN=... \
#     --from-literal=FATSECRET_ACCESS_TOKEN_SECRET=... \
#     --from-literal=MCP_BEARER_TOKEN=...
apiVersion: v1
kind: Secret
metadata:
  name: fatsecret-mcp-secrets
  namespace: fatsecret-mcp
type: Opaque
stringData:
  FATSECRET_CLIENT_ID: "REPLACE_ME"
  FATSECRET_CLIENT_SECRET: "REPLACE_ME"
  FATSECRET_CONSUMER_SECRET: "REPLACE_ME"
  FATSECRET_ACCESS_TOKEN: "REPLACE_ME"
  FATSECRET_ACCESS_TOKEN_SECRET: "REPLACE_ME"
  MCP_BEARER_TOKEN: "REPLACE_ME_WITH_openssl_rand_-hex_32"
