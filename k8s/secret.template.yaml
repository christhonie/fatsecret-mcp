# TEMPLATE — NOT applied by ArgoCD (excluded in the Application's directory.exclude).
# Create the real Secret imperatively so values never enter git:
#
#   export KUBECONFIG=<path-to-your-kubeconfig>
#   kubectl -n mcp create secret generic fatsecret-mcp-secrets \
#     --from-literal=FATSECRET_CLIENT_ID=...                        \
#     --from-literal=FATSECRET_CLIENT_SECRET=...                    \
#     --from-literal=FATSECRET_CONSUMER_SECRET=...                  \
#     --from-literal=FATSECRET_ACCESS_TOKEN=...                     \
#     --from-literal=FATSECRET_ACCESS_TOKEN_SECRET=...              \
#     --from-literal=OAUTH_CLIENT_ID=fatsecret-mcp-$(openssl rand -hex 8) \
#     --from-literal=OAUTH_CLIENT_SECRET=$(openssl rand -hex 32)    \
#     --from-literal=REDIS_URL="redis://:$REDIS_PW@<redis-host>.<redis-namespace>.svc.cluster.local:6379/<db>"
#
# NOTE: MCP_BEARER_TOKEN is obsolete — claude.ai's connector UI has no custom-header
# field, so auth is OAuth 2.1 (OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET) not a bearer.
#
# REDIS_URL is OPTIONAL. When present, OAuth tokens persist across pod rollouts
# (no forced re-auth after a deploy or reschedule); when absent the server uses
# in-memory state (resets on every restart). The deployment injects all of these
# via `envFrom: secretRef`, so adding REDIS_URL to this secret is all that is
# needed to switch on persistence. Source the Redis password (do not hard-code):
#   REDIS_PW=$(kubectl -n <redis-namespace> get secret <redis-secret-name> -o jsonpath='{.data.redis-password}' | base64 -d)
# The app-unique key prefix "fatsecret-mcp:oauth" (set in code) already isolates
# this server's keys, so a shared Redis DB is fine.
#
# NOTE: kubectl apply 3-way-merges Secrets (adds keys, never removes). To change
# the key schema (e.g. dropping the old MCP_BEARER_TOKEN), use kubectl delete +
# create instead of apply.
apiVersion: v1
kind: Secret
metadata:
  name: fatsecret-mcp-secrets
  namespace: mcp
type: Opaque
